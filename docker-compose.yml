volumes:
  postgres: ~
  composer_cache: ~
  VENDOR: ~
  CACHE: ~

services:
  nginx:
    image: nginx:alpine
    working_dir: /app
    volumes:
      - .:/app
      - ./docker/hosts/app.conf:/etc/nginx/conf.d/default.conf
      - ./docker/hosts/symfony:/etc/nginx/symfony
    ports:
      - "${NGINX_PORT}:80"
    links:
      - php

  postgres:
    ports:
      - "127.0.0.1:5433:5432"
    image: postgres:18-alpine
    volumes:
      - postgres:/var/lib/postgresql/18/docker
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pguser
      POSTGRES_DB: study_on

  php:
    build: docker/images/php
    working_dir: /app
    volumes:
      - .:/app
      - composer_cache:/composer-cache
      - VENDOR:/app/vendor
      - CACHE:/app/var/cache
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - COMPOSER_CACHE_DIR=/composer-cache
    links:
      - postgres
